<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Corner Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">

</head><body><div class="card">
    <div class="row" style="gap:16px;align-items:flex-end">
