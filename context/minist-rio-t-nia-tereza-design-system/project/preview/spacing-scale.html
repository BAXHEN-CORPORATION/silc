<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">
    <div class="label" style="margin-bottom:12px">Spacing scale · 4 · 8 · 12 · 16 · 24 · 32 · 48 · 64 · 80 · 96px</div>
    <div class="row" style="align-items:flex-end; gap:6px;">
      
        <div style="text-align:center;">

          <div class="mono" style="margin-top:4px">4</div>
        </div>
        <div style="text-align:center;">
          <div style="width:8px; height:8px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">8</div>
        </div>
        <div style="text-align:center;">
          <div style="width:12px; height:12px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">12</div>
        </div>
        <div style="text-align:center;">
          <div style="width:16px; height:16px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">16</div>
        </div>
        <div style="text-align:center;">
          <div style="width:24px; height:24px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">24</div>
        </div>
        <div style="text-align:center;">
          <div style="width:32px; height:32px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">32</div>
        </div>
        <div style="text-align:center;">
          <div style="width:48px; height:48px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">48</div>
        </div>
        <div style="text-align:center;">
          <div style="width:64px; height:64px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">64</div>
        </div>
        <div style="text-align:center;">
          <div style="width:80px; height:80px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">80</div>
        </div>
        <div style="text-align:center;">
          <div style="width:96px; height:96px; background:var(--red-500); border-radius:3px;"></div>
          <div class="mono" style="margin-top:4px">96</div>
        </div>
    </div>
    <div class="label" style="margin-top:18px; margin-bottom:8px">Section padding rhythm</div>
    <div style="background:var(--bg-2); border-radius:6px; padding:24px;">
      <div style="height:8px; background:var(--bg-3); border-radius:2px; margin-bottom:14px;"></div>
      <div style="height:8px; background:var(--bg-3); border-radius:2px; width:60%;"></div>
      <div class="mono" style="margin-top:14px;">96px vertical · 24px gutters</div>
    </div>
  </div></body></html>
