<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Event Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../ui_kits/marketing_site/styles.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">
    <div style="max-width:340px">
      <article class="evt">
        <div class="evt__photo" style="background-image:url(https://images.unsplash.com/photo-1519834785169-98be25ec3f84?w=600&q=70)">
          <span class="flag-chip evt__flag"><span class="flag-chip__emoji">🇧🇷</span><span>Brasil</span></span>
          <span class="evt__status is-open">Inscrições abertas</span>
        </div>
        <div class="evt__body">
          <div class="evt__date">25–29 MAIO 2026</div>
          <h3 class="evt__title">SILC Belo Horizonte</h3>
          <div class="evt__where">Belo Horizonte, Brasil</div>
          <div class="evt__foot"><span class="small">5 dias</span><span class="evt__detail-link">Ver detalhes →</span></div>
        </div>
      </article>
    </div>
  </div></body></html>
