<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Elevation / Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">
    <div class="row" style="gap:18px;align-items:flex-end">
      <div style="text-align:center"><div style="width:96px;height:60px;background:var(--bg-2);border-radius:6px;box-shadow:var(--shadow-mkp-base)"></div><div class="mono" style="margin-top:6px">mkp-base · button</div></div>
      <div style="text-align:center"><div style="width:96px;height:60px;background:var(--bg-2);border-radius:6px;box-shadow:var(--shadow-mkp-card)"></div><div class="mono" style="margin-top:6px">mkp-card</div></div>
      <div style="text-align:center"><div style="width:96px;height:60px;background:var(--red-500);border-radius:6px;box-shadow:var(--shadow-mkp-red-hover)"></div><div class="mono" style="margin-top:6px">red-hover</div></div>
      <div style="text-align:center"><div style="width:96px;height:60px;background:var(--bg-1);border-radius:6px;box-shadow:var(--shadow-mkp-main)"></div><div class="mono" style="margin-top:6px">main-raised</div></div>
    </div>
  </div></body></html>
