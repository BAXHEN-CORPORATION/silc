<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body><div class="card">
    <div class="row">
      
  <div class="sw">
    <div class="sw__chip" style="background:#3FB37F"></div>
    <div class="sw__meta">
      <div class="sw__name">success</div>
      <div class="sw__hex">--success<br>#3FB37F</div>
    </div>
  </div>
      
  <div class="sw">
    <div class="sw__chip" style="background:#E2A93A"></div>
    <div class="sw__meta">
      <div class="sw__name">warning</div>
      <div class="sw__hex">--warning<br>#E2A93A</div>
    </div>
  </div>
      
  <div class="sw">
    <div class="sw__chip" style="background:#ED3A3A"></div>
    <div class="sw__meta">
      <div class="sw__name">danger</div>
      <div class="sw__hex">--danger<br>#ED3A3A</div>
    </div>
  </div>
      
  <div class="sw">
    <div class="sw__chip" style="background:#4A89DC"></div>
    <div class="sw__meta">
      <div class="sw__name">info</div>
      <div class="sw__hex">--info<br>#4A89DC</div>
    </div>
  </div>
    </div>
    <div class="row" style="margin-top:14px;gap:8px">
      <span style="background: rgba(237,58,58,0.12); color: #FF7878; font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; letter-spacing:0.08em;">PILL TINT (RED)</span>
      <span style="background: rgba(63,179,127,0.16); color:#3FB37F; font-size:11px; font-weight:600; padding:4px 10px; border-radius:999px; letter-spacing:0.08em;">SUCCESS PILL</span>
      <span style="background:#C9242B; color:#fff; font-size:10px; font-weight:700; padding:6px 10px; border-radius:999px; letter-spacing:0.14em; text-transform:uppercase; transform: rotate(-6deg); display:inline-block;">Inscrições encerradas</span>
    </div>
  </div></body></html>
